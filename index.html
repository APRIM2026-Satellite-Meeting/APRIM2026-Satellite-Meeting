<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to APRIM 2026 Satellite Meeting...</title>
    <script type="text/javascript">
        // 1. Define your new base URL
        var targetUrl = "https://events.polyu.edu.hk/aprim2026_satellite/home";
        
        // 2. Check if the original link has a hash (e.g., #mission)
        if (window.location.hash) {
            // If it does, attach it to the new URL
            targetUrl += window.location.hash;
        }
        
        // 3. Redirect the user to the final URL
        window.location.replace(targetUrl);
    </script>
    
    <!-- Fallback: If JavaScript is disabled, it will still redirect to the main homepage -->
    <meta http-equiv="refresh" content="0; url=https://events.polyu.edu.hk/aprim2026_satellite/home">
</head>
<body>
    <p>Redirecting to the official website. If you are not redirected automatically, please <a href="https://events.polyu.edu.hk/aprim2026_satellite/home">click here</a>.</p>
</body>
</html>
